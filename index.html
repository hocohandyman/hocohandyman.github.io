<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoCo Handyman LLC | Home Improvement & Repairs</title>
    <meta name="description" content="Professional and reliable handyman services in Ellicott City, MD. MHIC # 168588">
    <style>
        /* Base Reset & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo img {
            max-width: 150px;
            height: auto;
        }
        .nav-links {
            display: flex;
            list-style: none;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            text-decoration: none;
            color: #0d233a;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #e67e22; /* Accent color */
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero-bg.jpg') center/cover no-repeat;
            color: #fff;
            text-align: center;
            padding: 100px 20px;
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .cta-button {
            display: inline-block;
            background-color: #e67e22;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .cta-button:hover {
            background-color: #d46a17;
        }

        /* Services Section */
        .services {
            padding: 60px 5%;
            background-color: #f9f9f9;
            text-align: center;
        }
        .services h2 {
            margin-bottom: 40px;
            color: #0d233a;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .service-card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Contact Section */
        .contact {
            padding: 60px 5%;
            text-align: center;
        }
        .contact form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .contact input, .contact textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .contact button {
            background-color: #0d233a;
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Business Footer */
        .business-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: #f4f4f4;
            text-align: center;
            font-family: Arial, sans-serif;
            border-top: 1px solid #ddd;
        }
        .business-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
        }
        .license-number {
            font-size: 1rem;
            font-weight: bold;
            color: #0d233a;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

   
 
    <!-- Business Footer -->
    <footer class="business-footer">
        <img src="Logo_v_3_1.png" alt="HoCo Handyman LLC Logo" class="business-logo">
        <p class="license-number">MHIC # 168588</p>
    </footer>

</body>
</html>
